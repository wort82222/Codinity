name: Daily Power Banks & Chargers Scraper

on:
  schedule:
    # Run daily at 5:00 AM UTC
    - cron: '0 5 * * *'
  
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd power_bank_chargers
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium
      
      - name: Run scraper
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          cd power_bank_chargers
          python scraper.py
      
      - name: Upload artifacts (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: power-bank-chargers-results
          path: |
            power_bank_chargers/data/*.xlsx
            power_bank_chargers/data/images/*.jpg
            power_bank_chargers/data/images/*.png
          retention-days: 7
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "Scraping job failed! Check the logs."
          # Add notification logic here (Slack, email, etc.)
